# Test Configuration
spring.application.name=springboot-advanced-batch-test

# H2 Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Spring Batch Configuration
spring.batch.initialize-schema=always
spring.batch.job.enabled=false

# CSV File Path for Tests
batch.input.file=classpath:data/orders-test.csv
